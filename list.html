<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OUR IDEAS</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="list-page">

<h1>♥ IDEAS LIST ♥</h1>
<p class="subtitle">PRESS ✓ TO MARK AS DONE</p>

<div class="list" id="ideaList"></div>

<button class="back-btn" onclick="goBack()">◀ BACK</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCVa3FTSYqKKTYqmSiYVm327U_i7v9HHT0",
    authDomain: "suggestion-box-lb73.firebaseapp.com",
    projectId: "suggestion-box-lb73",
    storageBucket: "suggestion-box-lb73.firebasestorage.app",
    messagingSenderId: "70767280613",
    appId: "1:70767280613:web:8b386e182ceb84a3c0ef0c",
    measurementId: "G-246T81VGHT"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const list = document.getElementById("ideaList");

  onSnapshot(collection(db, "ideas"), snapshot => {
    list.innerHTML = "";

    if (snapshot.empty) {
      list.innerHTML = '<p class="empty">NO IDEAS YET.<br>GO ADD SOME!</p>';
      return;
    }

    const sorted = [...snapshot.docs].sort((a, b) => {
      if (a.data().completed === b.data().completed) return 0;
      return a.data().completed ? 1 : -1;
    });

    sorted.forEach(d => {
      const data = d.data();

      const div = document.createElement("div");
      div.className = "card" + (data.completed ? " done" : "");

      const text = document.createElement("span");
      text.className = "idea-text";
      text.innerText = "▶ " + data.text.toUpperCase();

      const btn = document.createElement("button");
      btn.className = "tick-btn";
      btn.innerText = "✓";
      btn.onclick = () => updateDoc(doc(db, "ideas", d.id), { completed: !data.completed });

      div.appendChild(text);
      div.appendChild(btn);
      list.appendChild(div);
    });
  });

  window.goBack = function () { window.location.href = "index.html"; };
</script>
</body>
</html>
