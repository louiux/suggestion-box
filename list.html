<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDEAS LIST</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="list-page">

<h1>♥ IDEAS LIST ♥</h1>
<p class="subtitle">PRESS ✓ TO MARK AS DONE</p>

<div class="list" id="ideaList"></div>

<div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:32px;">
  <button class="back-btn" onclick="window.location.href='index.html'">◀ BACK</button>
  <button class="back-btn" style="background:#00ff41;border-color:#00ff41;box-shadow:4px 4px 0 0 #007a1e;color:#0d0014;" onclick="window.location.href='memories.html'">★ MEMORIES</button>
</div>

<!-- Calendar modal -->
<div id="calendar-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <p class="modal-heading">📅 ADD TO CALENDAR</p>
    <p class="modal-idea" id="cal-idea-title"></p>

    <label>DATE</label>
    <input type="date" id="cal-date" />

    <label>TIME</label>
    <input type="time" id="cal-time" value="19:00" />

    <div style="display:flex;flex-direction:column;gap:10px;margin-top:16px;">
      <button class="btn-gcal" onclick="addToGoogleCalendar()">▶ GOOGLE CALENDAR</button>
      <button class="btn-ical" onclick="downloadICS()">↓ APPLE / .ICS</button>
      <button class="btn-skip" onclick="closeCalModal()">CANCEL</button>
    </div>
  </div>
</div>

<!-- Memory modal -->
<div id="memory-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <p class="modal-heading">★ MEMORY UNLOCKED</p>
    <p class="modal-idea" id="modal-idea-title"></p>

    <label>DATE COMPLETED</label>
    <input type="text" id="modal-date" placeholder="dd/mm/yy" maxlength="8" />

    <label>NOTES</label>
    <textarea id="modal-notes" rows="3" placeholder="what did you get up to?"></textarea>

    <label>PHOTO (OPTIONAL)</label>
    <input type="file" id="modal-file" accept="image/*" style="display:none" onchange="handleFile(event)" />
    <button class="btn-upload" onclick="document.getElementById('modal-file').click()">↑ UPLOAD PHOTO</button>
    <img id="modal-preview" class="modal-preview" />

    <div class="modal-buttons">
      <button class="btn-save" onclick="saveMemory()">✓ SAVE</button>
      <button class="btn-skip" onclick="skipMemory()">SKIP</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCVa3FTSYqKKTYqmSiYVm327U_i7v9HHT0",
    authDomain: "suggestion-box-lb73.firebaseapp.com",
    projectId: "suggestion-box-lb73",
    storageBucket: "suggestion-box-lb73.firebasestorage.app",
    messagingSenderId: "70767280613",
    appId: "1:70767280613:web:8b386e182ceb84a3c0ef0c",
    measurementId: "G-246T81VGHT"
  };

  const app      = initializeApp(firebaseConfig);
  const db       = getFirestore(app);
  const storage  = getStorage(app);
  const list     = document.getElementById("ideaList");
  const modal    = document.getElementById("memory-modal");

  let pendingDocId = null;
  let selectedFile = null;

  onSnapshot(collection(db, "ideas"), snapshot => {
    list.innerHTML = "";

    if (snapshot.empty) {
      list.innerHTML = '<p class="empty">NO IDEAS YET.<br>GO ADD SOME!</p>';
      return;
    }

    const sorted = [...snapshot.docs].sort((a, b) => {
      if (a.data().completed === b.data().completed) return 0;
      return a.data().completed ? 1 : -1;
    });

    sorted.forEach(d => {
      const data = d.data();

      const div = document.createElement("div");
      div.className = "card" + (data.completed ? " done" : "");

      const text = document.createElement("span");
      text.className = "idea-text";
      text.innerText = "▶ " + data.text.toUpperCase();

      const btn = document.createElement("button");
      btn.className = "tick-btn";
      btn.innerText = "✓";
      btn.onclick = () => {
        if (data.completed) {
          updateDoc(doc(db, "ideas", d.id), { completed: false });
        } else {
          openModal(d.id, data.text);
        }
      };

      const calBtn = document.createElement("button");
      calBtn.className = "cal-btn";
      calBtn.innerText = "📅";
      calBtn.title = "Add to calendar";
      calBtn.onclick = () => openCalendarModal(data.text);

      div.appendChild(text);
      div.appendChild(calBtn);
      div.appendChild(btn);
      list.appendChild(div);
    });
  });

  function openModal(docId, text) {
    pendingDocId = docId;
    selectedFile = null;
    document.getElementById("modal-idea-title").innerText = text.toUpperCase();
    document.getElementById("modal-date").value = "";
    document.getElementById("modal-notes").value = "";
    document.getElementById("modal-preview").style.display = "none";
    document.getElementById("modal-file").value = "";
    modal.style.display = "flex";
  }

  window.handleFile = function(e) {
    selectedFile = e.target.files[0];
    if (!selectedFile) return;
    const preview = document.getElementById("modal-preview");
    preview.src = URL.createObjectURL(selectedFile);
    preview.style.display = "block";
  };

  window.saveMemory = async function() {
    const date  = document.getElementById("modal-date").value.trim();
    const notes = document.getElementById("modal-notes").value.trim();

    let photoUrl = null;

    if (selectedFile) {
      const storageRef = ref(storage, `memories/${pendingDocId}/photo`);
      await uploadBytes(storageRef, selectedFile);
      photoUrl = await getDownloadURL(storageRef);
    }

    await updateDoc(doc(db, "ideas", pendingDocId), {
      completed: true,
      completedDate: date || null,
      notes: notes || null,
      photoUrl: photoUrl || null,
    });

    modal.style.display = "none";
    pendingDocId = null;
    selectedFile = null;
  };

  window.skipMemory = async function() {
    await updateDoc(doc(db, "ideas", pendingDocId), { completed: true });
    modal.style.display = "none";
    pendingDocId = null;
  };

  modal.addEventListener("click", e => {
    if (e.target === modal) window.skipMemory();
  });

  const calModal = document.getElementById("calendar-modal");
  let calTitle = null;

  function openCalendarModal(text) {
    calTitle = text;
    document.getElementById("cal-idea-title").innerText = text.toUpperCase();
    document.getElementById("cal-date").value = new Date().toISOString().split("T")[0];
    document.getElementById("cal-time").value = "19:00";
    calModal.style.display = "flex";
  }

  window.addToGoogleCalendar = function() {
    const date = document.getElementById("cal-date").value;
    const time = document.getElementById("cal-time").value;
    if (!date) return;

    const start = date.replace(/-/g, "") + "T" + time.replace(":", "") + "00";
    const endDate = new Date(date + "T" + time);
    endDate.setHours(endDate.getHours() + 2);
    const end = date.replace(/-/g, "") + "T" + String(endDate.getHours()).padStart(2,"0") + String(endDate.getMinutes()).padStart(2,"0") + "00";

    const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(calTitle)}&dates=${start}/${end}&details=${encodeURIComponent("Date from our Date Box 💌")}`;
    window.open(url, "_blank");
  };

  window.downloadICS = function() {
    const date = document.getElementById("cal-date").value;
    const time = document.getElementById("cal-time").value;
    if (!date) return;

    const start = date.replace(/-/g, "") + "T" + time.replace(":", "") + "00";
    const endDate = new Date(date + "T" + time);
    endDate.setHours(endDate.getHours() + 2);
    const end = date.replace(/-/g, "") + "T" + String(endDate.getHours()).padStart(2,"0") + String(endDate.getMinutes()).padStart(2,"0") + "00";

    const ics = [
      "BEGIN:VCALENDAR",
      "VERSION:2.0",
      "BEGIN:VEVENT",
      `SUMMARY:${calTitle}`,
      `DTSTART:${start}`,
      `DTEND:${end}`,
      "DESCRIPTION:Date from our Date Box 💌",
      "END:VEVENT",
      "END:VCALENDAR"
    ].join("\n");

    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([ics], { type: "text/calendar" }));
    a.download = calTitle.replace(/\s+/g, "-") + ".ics";
    a.click();
  };

  window.closeCalModal = function() { calModal.style.display = "none"; };
  calModal.addEventListener("click", e => { if (e.target === calModal) window.closeCalModal(); });
</script>
</body>
</html>
