<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OUR MEMORIES</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="list-page">

<h1>♥ MEMORIES ♥</h1>
<p class="subtitle">DATES YOU'VE BEEN ON</p>

<div class="memories-list" id="memoriesList"></div>

<button class="back-btn" style="margin-top:32px;" onclick="window.location.href='index.html'">◀ BACK</button>

<!-- Edit memory modal -->
<div id="memory-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <p class="modal-heading">✎ EDIT MEMORY</p>
    <p class="modal-idea" id="modal-idea-title"></p>

    <label>DATE COMPLETED</label>
    <input type="text" id="modal-date" placeholder="dd/mm/yy" maxlength="8" />

    <label>NOTES</label>
    <textarea id="modal-notes" rows="3" placeholder="what did you get up to?"></textarea>

    <label>PHOTO</label>
    <input type="file" id="modal-file" accept="image/*" style="display:none" onchange="handleFile(event)" />
    <button class="btn-upload" onclick="document.getElementById('modal-file').click()">↑ CHANGE PHOTO</button>
    <img id="modal-preview" class="modal-preview" />

    <div class="modal-buttons">
      <button class="btn-save" onclick="saveMemory()">✓ SAVE</button>
      <button class="btn-skip" onclick="closeModal()">CANCEL</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCVa3FTSYqKKTYqmSiYVm327U_i7v9HHT0",
    authDomain: "suggestion-box-lb73.firebaseapp.com",
    projectId: "suggestion-box-lb73",
    storageBucket: "suggestion-box-lb73.firebasestorage.app",
    messagingSenderId: "70767280613",
    appId: "1:70767280613:web:8b386e182ceb84a3c0ef0c",
    measurementId: "G-246T81VGHT"
  };

  const app       = initializeApp(firebaseConfig);
  const db        = getFirestore(app);
  const storage   = getStorage(app);
  const container = document.getElementById("memoriesList");
  const modal     = document.getElementById("memory-modal");

  let pendingDocId = null;
  let selectedFile = null;

  onSnapshot(collection(db, "ideas"), snapshot => {
    container.innerHTML = "";

    const completed = snapshot.docs
      .filter(d => d.data().completed)
      .sort((a, b) => {
        const parseDate = str => {
          if (!str) return 0;
          const [dd, mm, yy] = str.split("/");
          return new Date(`20${yy}-${mm}-${dd}`).getTime();
        };
        return parseDate(b.data().completedDate) - parseDate(a.data().completedDate);
      });

    if (completed.length === 0) {
      container.innerHTML = '<p class="empty">NO MEMORIES YET.<br>COMPLETE A DATE FIRST!</p>';
      return;
    }

    completed.forEach(d => {
      const data = d.data();

      const card = document.createElement("div");
      card.className = "memory-card";

      const content = document.createElement("div");
      content.className = "memory-content";

      const titleRow = document.createElement("div");
      titleRow.style.cssText = "display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:8px;";

      const title = document.createElement("div");
      title.className = "memory-title";
      title.style.marginBottom = "0";
      title.innerText = "▶ " + data.text.toUpperCase();

      const editBtn = document.createElement("button");
      editBtn.innerText = "✎";
      editBtn.style.cssText = `
        background: transparent;
        border: 2px solid #ffe600;
        color: #ffe600;
        font-family: 'Press Start 2P', monospace;
        font-size: 8px;
        width: 26px;
        height: 26px;
        min-width: 26px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        flex-shrink: 0;
      `;
      editBtn.onclick = () => openModal(d.id, data);

      titleRow.appendChild(title);
      titleRow.appendChild(editBtn);
      content.appendChild(titleRow);

      if (data.completedDate) {
        const date = document.createElement("div");
        date.className = "memory-date";
        date.innerText = "📅 " + data.completedDate;
        content.appendChild(date);
      }

      if (data.notes) {
        const notes = document.createElement("div");
        notes.className = "memory-notes";
        notes.innerText = data.notes;
        content.appendChild(notes);
      }

      card.appendChild(content);

      if (data.photoUrl) {
        const img = document.createElement("img");
        img.className = "memory-photo";
        img.src = data.photoUrl;
        img.alt = data.text;
        card.appendChild(img);
      }

      container.appendChild(card);
    });
  });

  function openModal(docId, data) {
    pendingDocId = docId;
    selectedFile = null;

    document.getElementById("modal-idea-title").innerText = data.text.toUpperCase();
    document.getElementById("modal-date").value  = data.completedDate || "";
    document.getElementById("modal-notes").value = data.notes || "";

    const preview = document.getElementById("modal-preview");
    if (data.photoUrl) {
      preview.src = data.photoUrl;
      preview.style.display = "block";
    } else {
      preview.style.display = "none";
    }

    document.getElementById("modal-file").value = "";
    modal.style.display = "flex";
  }

  window.handleFile = function(e) {
    selectedFile = e.target.files[0];
    if (!selectedFile) return;
    const preview = document.getElementById("modal-preview");
    preview.src = URL.createObjectURL(selectedFile);
    preview.style.display = "block";
  };

  window.saveMemory = async function() {
    const date  = document.getElementById("modal-date").value.trim();
    const notes = document.getElementById("modal-notes").value.trim();

    const update = {
      completedDate: date  || null,
      notes:         notes || null,
    };

    if (selectedFile) {
      const storageRef = ref(storage, `memories/${pendingDocId}/photo`);
      await uploadBytes(storageRef, selectedFile);
      update.photoUrl = await getDownloadURL(storageRef);
    }

    await updateDoc(doc(db, "ideas", pendingDocId), update);
    closeModal();
  };

  window.closeModal = function() {
    modal.style.display = "none";
    pendingDocId = null;
    selectedFile = null;
  };

  modal.addEventListener("click", e => {
    if (e.target === modal) window.closeModal();
  });
</script>
</body>
</html>
